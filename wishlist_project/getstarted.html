<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>WishList | Приєднатися</title>
</head>
<body>
    <div class="container">
        <nav>
            <ul>
                <li class="logo">
                    <a href="index.html" style="text-decoration: none; color: inherit;">WishList</a>
                </li>
                
                <li><a href="examples.html">Examples</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="getstarted.html" class="btn-nav">Get Started</a></li>
            </ul>
        </nav>

        <header class="hero-text" style="max-width: 600px; margin: 0 auto;">
            <h1>Приєднуйтесь до нас</h1>
            <form style="display: flex; flex-direction: column; gap: 15px; text-align: left;">
                <label>Ваше ім'я</label>
                <input type="text" placeholder="Name" style="padding: 12px; border: 1px solid #ddd; border-radius: 8px;">

                <label>Email</label>
                <input type="email" placeholder="email@example.com" style="padding: 12px; border: 1px solid #ddd; border-radius: 8px;">

                <label>Пароль</label>
                <input type="password"placeholder="Password" style="padding: 12px; border: 1px solid #ddd; border-radius: 8px;">

                <button type="submit" class="btn-main" style="width: 100%; cursor: pointer; border: 2px solid #DB99A0;">Зареєструватися</button>
            </form>

            <hr style="margin: 50px 0; border: 0; border-top: 2px solid #F0F2F5;">

            <h1>Створити новий вішліст</h1>
            <input type="text" placeholder="Назва (напр. Мій День Народження)" style="padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 100%; margin-bottom: 20px;">
            <button class="btn-main" style="border: 2px solid #DB99A0;">Додати бажання +</button>
        </header>
    </div>
</body>
</html>
