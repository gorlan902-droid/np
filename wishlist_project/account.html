{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Акаунт - WishList</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="container">
        <header class="navbar">
            <div class="logo">
                <a href="/">WishList</a>
            </div>
            <nav class="nav-links">
                <a href="/examples/">Examples</a>
                <a href="/about/">About</a>
                <a href="/account/" class="btn-nav">My Account</a>
            </nav>
        </header>

        <section class="form-page">
            <div class="form-card">
                <h2>Мій акаунт</h2>
                <p class="center-text">Ви увійшли як: <strong>{{ request.user.username }}</strong></p>

                <form method="post" action="/logout/">
                    {% csrf_token %}
                    <button type="submit" class="hero-btn full-btn">Вийти</button>
                </form>
            </div>
        </section>
    </div>
</body>
</html>
