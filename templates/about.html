{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - WishList</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="container">
        <header class="navbar">
            <div class="logo">
                <a href="/">WishList</a>
            </div>
            <nav class="nav-links">
                <a href="/examples/">Examples</a>
                <a href="/about/">About</a>
        
                {% if user.is_authenticated %}
                    <a href="/account/" class="btn-nav">My Account</a>
                {% else %}
                    <a href="/register/" class="btn-nav">Get Started</a>
                {% endif %}
            </nav>
        </header>

        <section class="page-section">
            <div class="page-text">
                <h1>Про проект</h1>
                <p>WishList — це платформа, яка допомагає людям ділитися своїми мріями.</p>
                <p>Більше ніяких непотрібних подарунків. Тільки те, що приносить радість.</p>
            </div>
        </section>
    </div>
</body>
</html>
